<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
</head>
<body>
      <h2>Guess Game</h2>
      <input type="number" , id = "num" , placeholder="enter the number" id="userInput">
      <button onclick="playgame()">Guess</button>
      <p id="feedback"></p>
      <p id="attempts"></p>

      <script>
        let target=Math.floor(Math.random()*50)+1;
        let count=0;

        function playgame(){

            let number=document.getElementById("num").value;
            count++;
            if(number<target){
                document.getElementById("feedback").innerText="Too low"
            }
            else if(number>target){
                document.getElementById("feedback").innerText="Too high"

            }
            else{
                document.getElementById("feedback").innerText="You guessed it correct"
                document.getElementById("attempts").innerText="You have tried"+count;
            }
        }
      </script>

</body>
</html>
